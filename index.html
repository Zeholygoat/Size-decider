<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Size Match 💋</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="background"></div>

<div class="container">

  <div class="card">

    <h1>Size Match 💋</h1>

    <p class="subtitle">
      Discover your ideal size based on your comfort, confidence, and vibe.
    </p>

    <div class="quiz">

      <!-- QUESTION 1 -->
      <div class="question">

        <h3>How experienced are you? 💕</h3>

        <div class="options" data-question="experience">

          <button class="option" data-value="1">
            Never tried anything
          </button>

          <button class="option" data-value="2">
            Still kinda shy
          </button>

          <button class="option" data-value="3">
            Comfortable & curious
          </button>

          <button class="option" data-value="4">
            Pretty experienced
          </button>

          <button class="option" data-value="5">
            Certified troublemaker
          </button>

        </div>

      </div>

      <!-- QUESTION 2 -->
      <div class="question">

        <h3>What sounds best to you? 🔥</h3>

        <div class="options" data-question="fullness">

          <button class="option" data-value="1">
            Cute & gentle
          </button>

          <button class="option" data-value="2">
            A little fullness
          </button>

          <button class="option" data-value="3">
            Balanced pressure
          </button>

          <button class="option" data-value="4">
            Strong fullness
          </button>

          <button class="option" data-value="5">
            Maximum intensity
          </button>

        </div>

      </div>

      <!-- QUESTION 3 -->
      <div class="question">

        <h3>Pick your energy tonight 😈</h3>

        <div class="options" data-question="vibe">

          <button class="option" data-value="1">
            Soft princess
          </button>

          <button class="option" data-value="2">
            Flirty energy
          </button>

          <button class="option" data-value="3">
            Main character
          </button>

          <button class="option" data-value="4">
            Brat mode
          </button>

          <button class="option" data-value="5">
            Absolute chaos
          </button>

        </div>

      </div>

      <!-- QUESTION 4 -->
      <div class="question">

        <h3>How intense do you want it? 💜</h3>

        <div class="options" data-question="intensity">

          <button class="option" data-value="1">
            Very gentle
          </button>

          <button class="option" data-value="2">
            Soft but exciting
          </button>

          <button class="option" data-value="3">
            Balanced
          </button>

          <button class="option" data-value="4">
            Pretty intense
          </button>

          <button class="option" data-value="5">
            Maximum intensity
          </button>

        </div>

      </div>

      <!-- QUESTION 5 -->
      <div class="question">

        <h3>How adventurous are you? ✨</h3>

        <div class="options" data-question="adventure">

          <button class="option" data-value="1">
            Very cautious
          </button>

          <button class="option" data-value="2">
            A little curious
          </button>

          <button class="option" data-value="3">
            Open-minded
          </button>

          <button class="option" data-value="4">
            Bold & confident
          </button>

          <button class="option" data-value="5">
            I want a challenge
          </button>

        </div>

      </div>

      <button class="reveal-btn" onclick="calculateSize()">
        Reveal My Size ✨
      </button>

    </div>

    <div class="result hidden" id="result"></div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
