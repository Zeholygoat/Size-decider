<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Euphoria Size Match</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="bg"></div>

  <main class="container">
    <div class="glass">
      <h1>Euphoria Size Match 💋</h1>
      <p class="subtitle">
        Find the size that matches your vibe, confidence, and energy.
      </p>

      <div class="quiz">
        <label>What's your energy tonight?</label>
        <select id="energy">
          <option value="1">Soft & Sweet</option>
          <option value="2">Flirty</option>
          <option value="3">Confident</option>
          <option value="4">Dangerous</option>
          <option value="5">Chaos Mode</option>
        </select>

        <label>How experienced are you?</label>
        <select id="experience">
          <option value="1">Beginner</option>
          <option value="2">Curious</option>
          <option value="3">Comfortable</option>
          <option value="4">Experienced</option>
          <option value="5">Expert</option>
        </select>

        <label>How intense do you like things?</label>
        <input type="range" min="1" max="5" value="3" id="intensity"/>

        <label>Choose your aesthetic</label>
        <select id="aesthetic">
          <option value="1">Soft Pink</option>
          <option value="2">Luxury Black</option>
          <option value="3">Neon Purple</option>
          <option value="4">Velvet Red</option>
          <option value="5">Cyber Angel</option>
        </select>

        <button onclick="generateResult()">Reveal My Match ✨</button>
      </div>

      <div id="result" class="result hidden"></div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
